        .container { width: 100%; max-width: 1100px; display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }

        .panel {

        .todo-text:hover { color: var(--accent-todo); }
        .timestamp { font-size: 0.72rem; color: var(--text-muted); user-select: none; letter-spacing: 0.3px; }
        .todo-content input[type="checkbox"] { -webkit-appearance: none; appearance: none; width: 20px; height: 20px; border: 2px solid var(--border-color); border-radius: 6px; cursor: pointer; position: relative; flex-shrink: 0; transition: all 0.3s var(--transition-spring), background 0.6s ease, border-color 0.6s ease; }
        .todo-content input[type="checkbox"]:checked { background: var(--check-color); border-color: var(--check-color); }
        .todo-content input[type="checkbox"]:checked::after { content: ''; position: absolute; left: 5px; top: 2px; width: 5px; height: 9px; border: solid white; border-width: 0 2px 2px 0; transform: rotate(45deg); }
        .todo-content input[type="checkbox"]:active { transform: scale(0.75); }

        .idea-card { background: var(--input-bg); border-left: 3px solid var(--accent-idea); padding: 16px 18px; margin-bottom: 12px; border-radius: 0 var(--radius-sm) var(--radius-sm) 0; animation: cardEnter 0.45s var(--transition-spring) both; transition: all 0.3s var(--transition-elastic), background 0.6s ease, border-color 0.6s ease; position: relative; }
        .idea-card::before { content: ''; position: absolute; left: 3px; top: 0; bottom: 0; width: 0; background: var(--accent-idea-glow); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; transition: width 0.4s var(--transition-elastic), background 0.6s ease; }
        .idea-card:hover { transform: translateX(4px); box-shadow: -4px 0 20px var(--accent-idea-glow); }
        .idea-card:hover::before { width: 100%; left: 0; }
        .idea-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; user-select: none; position: relative; z-index: 1; }
        .idea-text { font-size: 0.92rem; line-height: 1.65; white-space: pre-wrap; word-break: break-all; cursor: text; position: relative; z-index: 1; }
        .inline-edit-textarea { width: 100%; min-height: 60px; border: 1.5px solid var(--accent-idea); border-radius: 8px; padding: 8px 12px; font-size: 0.92rem; line-height: 1.65; color: var(--text-main); background: var(--card-bg-solid); outline: none; resize: vertical; box-shadow: 0 0 0 3px var(--accent-idea-glow); }

        .action-text-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 0.78rem; padding: 4px 10px; border-radius: 6px; font-weight: 500; transition: all 0.25s var(--transition-elastic); }
        .action-text-btn:hover { color: #ef4444; background: rgba(239,68,68,0.08); transform: scale(1.05); }
        .restore-btn:hover { color: var(--accent-todo); background: var(--accent-todo-glow); }

        .empty-tip { text-align: center; color: var(--text-muted); font-size: 0.88rem; margin-top: 48px; opacity: 0.6; animation: emptyFadeIn 0.6s var(--transition-elastic) both; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .empty-tip .empty-icon { font-size: 2.4rem; opacity: 0.4; }
        @keyframes emptyFadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 0.6; transform: translateY(0); } }

        .list-container .item-card:nth-child(1) { animation-delay: 0s; }
        .list-container .item-card:nth-child(2) { animation-delay: 0.04s; }
        .list-container .item-card:nth-child(3) { animation-delay: 0.08s; }
        .list-container .item-card:nth-child(4) { animation-delay: 0.12s; }
        .list-container .item-card:nth-child(5) { animation-delay: 0.16s; }
        .list-container .item-card:nth-child(6) { animation-delay: 0.2s; }
        .list-container .item-card:nth-child(7) { animation-delay: 0.24s; }
        .list-container .item-card:nth-child(8) { animation-delay: 0.28s; }
        .list-container .item-card:nth-child(9) { animation-delay: 0.32s; }
        .list-container .item-card:nth-child(10) { animation-delay: 0.36s; }
        .list-container .idea-card:nth-child(1) { animation-delay: 0s; }
        .list-container .idea-card:nth-child(2) { animation-delay: 0.05s; }
        .list-container .idea-card:nth-child(3) { animation-delay: 0.1s; }
        .list-container .idea-card:nth-child(4) { animation-delay: 0.15s; }
        .list-container .idea-card:nth-child(5) { animation-delay: 0.2s; }

        .footer { margin-top: 28px; text-align: center; font-size: 0.75rem; color: var(--text-muted); opacity: 0.4; letter-spacing: 0.5px; }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; gap: 20px; }
            .auth-card { padding: 30px 22px; }
            .header-bar { flex-direction: column; align-items: stretch; gap: 12px; }
            .header-right-group { justify-content: space-between; }
        }
    </style>
</head>
<body>

    <!-- 主题切换遮罩层已移除 -->

    <div class="theme-deco deco-light" id="deco-light"></div>
    <div class="theme-deco deco-dark" id="deco-dark"></div>
    <div class="theme-deco deco-forest" id="deco-forest"></div>
    <div class="theme-deco deco-pink" id="deco-pink"></div>

    <!-- ==================== 登录页 ==================== -->
    <div class="auth-shell" id="auth-shell">
        <div class="auth-card">
            <div class="auth-eyebrow">随心工作台</div>
            <h1 id="auth-title">邮箱登录</h1>
            <p class="auth-subtitle" id="auth-subtitle">输入邮箱地址，我们会发送一封登录链接到你的收件箱。</p>
            <div class="auth-form" id="auth-form">
                <input type="email" id="auth-email" placeholder="输入邮箱地址">
                <input type="password" id="auth-password" class="hidden" placeholder="设置密码（至少 6 位）">
                <button class="main-btn auth-submit-btn" id="auth-submit-btn" onclick="handleAuthSubmit()">发送登录链接</button>
            </div>
            <div class="auth-footer">
                <button class="auth-switch-btn" id="auth-switch-btn" onclick="toggleAuthMode()">没有账号？<strong>去注册</strong></button>
            </div>
            <div class="auth-message" id="auth-message"></div>
        </div>
    </div>

    <!-- ==================== 主应用 ==================== -->
    <div class="app-shell hidden" id="app-shell">
        <div class="header-bar">
            <span class="app-title">✦ 随心工作台</span>
            <div class="header-right-group">
                <div class="header-user">
                    <strong id="user-email">-</strong>
                    <button class="panel-action-btn" onclick="signOut()">退出</button>
                </div>
                <div class="custom-dropdown" id="theme-dropdown">
                    <div class="dropdown-btn" id="dropdown-title" onclick="toggleDropdown(event)">简约浅灰</div>
                    <div class="dropdown-menu">
                        <div class="dropdown-item" data-value="light" onclick="selectTheme('light', '简约浅灰')">简约浅灰</div>
                        <div class="dropdown-item" data-value="cute-pink" onclick="selectTheme('cute-pink', '温柔甜妹')">温柔甜妹</div>
                        <div class="dropdown-item" data-value="dark" onclick="selectTheme('dark', '优雅深色')">优雅深色</div>
                        <div class="dropdown-item" data-value="forest" onclick="selectTheme('forest', '复古森林')">复古森林</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="container">
            <div class="panel">
                <h2 class="todo-title">
                    <span id="todo-panel-title">每日待办</span>
                    <button class="panel-action-btn" id="todo-trash-toggle" onclick="toggleTodoTrash()">回收站</button>
                </h2>
                <div class="input-group" id="todo-input-zone">
                    <input type="text" id="todo-input" placeholder="输入今天的任务.." onkeydown="if(event.key==='Enter') addTodo()">
                    <button class="main-btn todo-btn" onclick="addTodo()">添加</button>
                </div>
                <div class="list-container" id="todo-list"></div>
            </div>

            <div class="panel">
                <h2 class="idea-title">
                    <span id="idea-panel-title">灵感闪现</span>
                    <button class="panel-action-btn" id="idea-trash-toggle" onclick="toggleIdeaTrash()">回收站</button>
                </h2>
                <div class="input-group" id="idea-input-zone">
                    <textarea class="unified-input" id="idea-input" placeholder="捕捉瞬间的想法.. Ctrl+Enter 提交"></textarea>
                    <button class="main-btn idea-btn" onclick="addIdea()">记录</button>
                </div>
                <div class="list-container" id="idea-list"></div>
            </div>
        </div>

        <div class="footer">随心工作台 · 让想法自由流淌</div>
    </div>

    <script>
        // ===================== 状态 =====================
        let todos = [], ideas = [];
        let todoTrash = JSON.parse(localStorage.getItem('my_todo_trash')) || [];
        let ideaTrash = JSON.parse(localStorage.getItem('my_idea_trash')) || [];
        let currentTheme = localStorage.getItem('my_theme') || 'light';
        let currentUser = null;
        let isAuthLoginMode = true;
        const themeNamesMap = { 'light': '简约浅灰', 'cute-pink': '温柔甜妹', 'dark': '优雅深色', 'forest': '复古森林' };
        let isTodoTrashView = false, isIdeaTrashView = false;
        let draggedTodoId = null, isEditingMode = false;
        const AUTH_RETURN_URL_KEY = 'my_auth_return_url';
        // 【修复 5】去重标记，防止 onAuthStateChange 重复触发
        let lastAuthUserId = null;
        const dragPlaceholder = document.createElement('div');
        dragPlaceholder.className = 'drag-placeholder';

        // ===================== 初始化 =====================
        window.onload = async function() {
            initTheme(currentTheme);
            setupDragAndDrop();
            setupGlobalEvents();
            initDecorations();
            setupRippleEffect();
            syncAuthCopy();

            // 【修复 1 + 5】先注册监听器，再处理回调，再检查已有 session
            supabaseClient.auth.onAuthStateChange((event, session) => {
                if (event === 'SIGNED_OUT') {
                    handleAuthState(null);
                } else if (session) {
                    handleAuthState(session.user);
                }
            });

            await handleAuthCallback();

            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) handleAuthState(session.user);
        };

        function setupGlobalEvents() {
            document.addEventListener('click', function(e) {
                const dd = document.getElementById('theme-dropdown');
                if (dd && !dd.contains(e.target)) dd.classList.remove('active');
            });
            document.getElementById('idea-input').addEventListener('keydown', function(e) {
                if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); addIdea(); }
            });
            // 灵感输入框自动增高
            document.getElementById('idea-input').addEventListener('input', function() {
                this.style.height = '46px';
                this.style.height = Math.min(this.scrollHeight, 150) + 'px';
            });
        }

        // ===================== 装饰（【修复 2】大幅增强浅色主题可见度）=====================
        function initDecorations() {
            const lightBox = document.getElementById('deco-light');
            for (let i = 0; i < 32; i++) {
                const p = document.createElement('div');
                p.className = 'dust-mote';
                p.style.left = Math.random()*100+'%';
                p.style.top = (5+Math.random()*90)+'%';
                const s = 7 + Math.random()*9;
                p.style.width = p.style.height = s+'px';
                const useOrange = Math.random() > 0.45;
                const hue = useOrange ? '28, 80%, 58%' : '215, 70%, 58%';
                const peakA = 0.5 + Math.random()*0.2;
                const midA = 0.12 + Math.random()*0.12;
                p.style.background = `radial-gradient(circle, hsla(${hue}, ${peakA}) 25%, hsla(${hue}, ${peakA*0.3}) 60%, hsla(${hue}, 0) 100%)`;
                p.style.boxShadow = `0 0 ${s*1.5}px ${s*0.8}px hsla(${hue}, ${peakA*0.35})`;
                p.style.setProperty('--peak', peakA);
                p.style.setProperty('--mid', midA);
                p.style.setProperty('--dx', (Math.random()*60-30)+'px');
                p.style.setProperty('--dy', -(30+Math.random()*60)+'px');
                p.style.animationDuration = (8+Math.random()*12)+'s';
                p.style.animationDelay = (Math.random()*10)+'s';
                lightBox.appendChild(p);
            }
            const darkBox = document.getElementById('deco-dark');
            for (let i=0;i<60;i++){const s=document.createElement('div');s.className='star';s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';s.style.setProperty('--dur',(2+Math.random()*4)+'s');s.style.setProperty('--max-opacity',(0.3+Math.random()*0.5));s.style.animationDelay=(Math.random()*4)+'s';s.style.width=s.style.height=(1+Math.random()*2)+'px';darkBox.appendChild(s);}
            const forestBox = document.getElementById('deco-forest');
            for (let i=0;i<22;i++){const f=document.createElement('div');f.className='firefly';f.style.left=Math.random()*100+'%';f.style.top=Math.random()*100+'%';const s=2+Math.random()*2.5;f.style.width=f.style.height=s+'px';f.style.setProperty('--dx',(Math.random()*80-40)+'px');f.style.setProperty('--dy',(Math.random()*80-40)+'px');f.style.animationDuration=(7+Math.random()*10)+'s';f.style.animationDelay=(Math.random()*10)+'s';forestBox.appendChild(f);}
            const pinkBox = document.getElementById('deco-pink');
            for (let i=0;i<32;i++){const sp=document.createElement('div');sp.className='sparkle';sp.style.left=Math.random()*100+'%';sp.style.top=Math.random()*100+'%';const s=1.5+Math.random()*3;sp.style.width=sp.style.height=s+'px';sp.style.setProperty('--sdur',(3+Math.random()*6)+'s');sp.style.animationDelay=(Math.random()*8)+'s';pinkBox.appendChild(sp);}
        }

        function setupRippleEffect() {
            document.querySelectorAll('button.main-btn').forEach(btn => {
                btn.addEventListener('mouseenter', function(e) {
                    const r = this.getBoundingClientRect();
                    this.style.setProperty('--ripple-x', ((e.clientX-r.left)/r.width*100)+'%');
                    this.style.setProperty('--ripple-y', ((e.clientY-r.top)/r.height*100)+'%');
                });
            });
        }

        // ===================== 认证状态（【修复 5】增加去重）=====================
        function handleAuthState(user) {
            const newId = user ? user.id : null;
            if (newId === lastAuthUserId) return;
            lastAuthUserId = newId;

            currentUser = user;
            if (user) {
                document.getElementById('auth-shell').classList.add('hidden');
                document.getElementById('app-shell').classList.remove('hidden');
                document.getElementById('user-email').innerText = user.email || '未命名邮箱';
                setAuthMessage('');
                loadDataFromSupabase();
            } else {
                document.getElementById('auth-shell').classList.remove('hidden');
                document.getElementById('app-shell').classList.add('hidden');
                document.getElementById('user-email').innerText = '-';
                todos = []; ideas = [];
                renderTodos(); renderIdeas();
            }
        }

        // ===================== 认证 UI =====================
        function syncAuthCopy() {
            const pwdInput = document.getElementById('auth-password');
            const titleEl = document.getElementById('auth-title');
            const subEl = document.getElementById('auth-subtitle');
            const btnEl = document.getElementById('auth-submit-btn');
            const switchEl = document.getElementById('auth-switch-btn');
            if (isAuthLoginMode) {
                titleEl.innerText = '邮箱登录';
                subEl.innerText = '输入邮箱地址，我们会发送一封登录链接到你的收件箱。';
                btnEl.innerText = '发送登录链接';
                switchEl.innerHTML = '没有账号？<strong>去注册</strong>';
                pwdInput.classList.add('hidden');
                pwdInput.value = '';
            } else {
                titleEl.innerText = '邮箱注册';
                subEl.innerText = '设置邮箱和密码来创建账号，注册后需确认邮件方可使用。';
                btnEl.innerText = '创建账号';
                switchEl.innerHTML = '已有账号？<strong>去登录</strong>';
                pwdInput.classList.remove('hidden');
            }
            setAuthMessage('');
        }

        function toggleAuthMode() { isAuthLoginMode = !isAuthLoginMode; syncAuthCopy(); }

        function setAuthMessage(msg, type = '') {
            const el = document.getElementById('auth-message');
            el.className = type ? `auth-message ${type}` : 'auth-message';
            el.innerText = msg;
        }

        function normalizeAppPath(pathname) {
            const path = pathname || '/';
            if (/\.[a-z0-9]+$/i.test(path) || path.endsWith('/')) return path;
            return `${path}/`;
        }

        function getCanonicalAppUrl() {
            const current = new URL(window.location.href);
            current.search = '';
            current.hash = '';
            current.pathname = normalizeAppPath(current.pathname);
            return current.toString();
        }

        function getRedirectUrl() {
            if (window.location.origin && window.location.origin !== 'null') {
                return getCanonicalAppUrl();
            }
            return window.location.href.split('?')[0].split('#')[0];
        }

        function rememberReturnUrl() {
            try {
                localStorage.setItem(AUTH_RETURN_URL_KEY, getRedirectUrl());
            } catch (err) {
                console.warn('记录跳转地址失败:', err);
            }
        }

        function consumeReturnUrl() {
            try {
                const saved = localStorage.getItem(AUTH_RETURN_URL_KEY);
                localStorage.removeItem(AUTH_RETURN_URL_KEY);
                return saved || getRedirectUrl();
            } catch (err) {
                console.warn('读取跳转地址失败:', err);
                return getRedirectUrl();
            }
        }

        function getHashParams(hash) {
            const raw = hash.startsWith('#') ? hash.slice(1) : hash;
            return new URLSearchParams(raw);
        }

        // 回调处理更健壮，增加 try-catch 和详细日志
        async function handleAuthCallback() {
            const url = new URL(window.location.href);
            const hashParams = getHashParams(url.hash);
            const code = url.searchParams.get('code') || hashParams.get('code');
            const tokenHash = url.searchParams.get('token_hash') || hashParams.get('token_hash');
            const authType = url.searchParams.get('type') || hashParams.get('type');
            const errorDesc = url.searchParams.get('error_description') || hashParams.get('error_description');
            const accessToken = hashParams.get('access_token');
            const refreshToken = hashParams.get('refresh_token');

            if (errorDesc) { setAuthMessage(decodeURIComponent(errorDesc), 'error'); return; }
            if (!code && !tokenHash && !(accessToken && refreshToken)) return;

            try {
                let authError = null;
                if (code) {
                    const r = await supabaseClient.auth.exchangeCodeForSession(code);
                    authError = r.error;
                } else if (accessToken && refreshToken) {
                    const r = await supabaseClient.auth.setSession({
                        access_token: accessToken,
                        refresh_token: refreshToken
                    });
                    authError = r.error;
                } else if (tokenHash) {
                    const r = await supabaseClient.auth.verifyOtp({
                        token_hash: tokenHash,
                        type: authType || 'email'
                    });
                    authError = r.error;
                }

                if (authError) {
                    console.error('认证回调错误:', authError);
                    setAuthMessage(authError.message || '确认失败，请重试。', 'error');
                    return;
                }

                // 清理 URL 中的认证参数
                url.searchParams.delete('code');
                url.searchParams.delete('token_hash');
                url.searchParams.delete('type');
                url.searchParams.delete('error_description');
                url.searchParams.delete('state');
                hashParams.delete('access_token');
                hashParams.delete('refresh_token');
                hashParams.delete('expires_at');
                hashParams.delete('expires_in');
                hashParams.delete('token_type');
                hashParams.delete('type');
                hashParams.delete('code');
                hashParams.delete('token_hash');

                url.pathname = normalizeAppPath(url.pathname);
                url.hash = hashParams.toString() ? `#${hashParams.toString()}` : '';
                // 使用 replaceState 清理 URL，不刷新页面
                window.history.replaceState({}, document.title, `${url.pathname}${url.search}${url.hash}`);
                setAuthMessage('已确认，欢迎回来！', 'success');
            } catch (err) {
                console.error('认证回调异常:', err);
                setAuthMessage('认证过程出现异常，请重试。', 'error');
            }
        }

        // ===================== 认证操作 =====================
        async function handleAuthSubmit() {
            const email = document.getElementById('auth-email').value.trim();
            if (isAuthLoginMode) {
                if (!email) { setAuthMessage('请输入邮箱地址。', 'error'); return; }
                setAuthMessage('正在发送登录链接..');
                rememberReturnUrl();
                const { error } = await supabaseClient.auth.signInWithOtp({
                    email,
                    options: { emailRedirectTo: getRedirectUrl() }
                });
                if (error) { setAuthMessage(error.message || '发送失败，请稍后再试。', 'error'); return; }
                setAuthMessage('登录链接已发送，请打开邮箱点击链接即可进入工作台。', 'success');
            } else {
                const password = document.getElementById('auth-password').value;
                if (!email) { setAuthMessage('请输入邮箱地址。', 'error'); return; }
                if (!password || password.length < 6) { setAuthMessage('密码至少需要 6 位。', 'error'); return; }
                setAuthMessage('正在创建账号...');
                try {
                    rememberReturnUrl();
                    const { data, error } = await supabaseClient.auth.signUp({
                        email,
                        password,
                        options: { emailRedirectTo: getRedirectUrl() }
                    });
                    if (error) { setAuthMessage(error.message || '注册失败，请稍后再试。', 'error'); return; }
                    if (data.session) {
                        setAuthMessage('注册成功，已自动登录！', 'success');
                    } else {
                        setAuthMessage('注册成功！请前往邮箱点击确认链接，完成注册后即可用密码登录。', 'success');
                    }
                } catch (err) {
                    console.error('注册异常:', err);
                    setAuthMessage('注册过程出现异常，请稍后重试。', 'error');
                }
            }
        }

        async function signOut() {
            lastAuthUserId = null; // 重置去重标记
            const { error } = await supabaseClient.auth.signOut();
            if (error) { setAuthMessage(error.message || '退出失败。', 'error'); return; }
            document.getElementById('auth-password').value = '';
            setAuthMessage('你已退出登录。', 'success');
        }

        // ===================== 数据操作（【修复 3】乐观更新，不再全量重载）=====================

        function sortTodos() {
            todos.sort((a, b) => {
                if (a.is_completed !== b.is_completed) return a.is_completed ? 1 : -1;
                return (a.order_index ?? 0) - (b.order_index ?? 0);
            });
        }

        // 初始加载（仅登录时调用一次）
        async function loadDataFromSupabase() {
            if (!currentUser) return;
            try {
                const [todoRes, ideaRes] = await Promise.all([
                    supabaseClient.from('todos').select('*').order('is_completed', { ascending: true }).order('order_index', { ascending: true }),
                    supabaseClient.from('ideas').select('*').order('created_at', { ascending: false })
                ]);
                if (todoRes.data) todos = todoRes.data;
                if (ideaRes.data) ideas = ideaRes.data;
                renderTodos(); renderIdeas();
            } catch (err) {
                console.error('加载数据失败:', err);
            }
        }

        // ── 待办 CRUD ──
        async function addTodo() {
            const inp = document.getElementById('todo-input');
            const text = inp.value.trim();
            if (!text) return;
            inp.value = '';
            try {
                const { data, error } = await supabaseClient.from('todos')
                    .insert([{ text, is_completed: false, order_index: todos.length }])
                    .select();
                if (!error && data && data[0]) {
                    todos.push(data[0]);
                    sortTodos();
                    renderTodos();
                } else if (error) {
                    inp.value = text; // 失败时恢复输入
                    console.error('添加待办失败:', error);
                }
            } catch (err) {
                inp.value = text;
                console.error('添加待办异常:', err);
            }
        }

        async function toggleTodo(id, cur) {
            const todo = todos.find(t => t.id === id);
            if (!todo) return;
            const prev = todo.is_completed;
            todo.is_completed = !cur;
            sortTodos();
            renderTodos();
            const { error } = await supabaseClient.from('todos').update({ is_completed: !cur }).eq('id', id);
            if (error) {
                todo.is_completed = prev;
                sortTodos();
                renderTodos();
                console.error('切换待办状态失败', error);
            }
        }

        async function trashTodo(id) {
            const idx = todos.findIndex(t => t.id === id);
            if (idx === -1) return;
            const t = todos[idx];
            // 乐观：先移入回收站、从列表删除、重新渲染
            todoTrash.push({ id: t.id, text: t.text, time: formatTime(t.created_at), is_completed: t.is_completed });
            localStorage.setItem('my_todo_trash', JSON.stringify(todoTrash));
            todos.splice(idx, 1);
            renderTodos();
            const { error } = await supabaseClient.from('todos').delete().eq('id', id);
            if (error) {
                // 回滚
                todos.splice(idx, 0, t);
                todoTrash.pop();
                localStorage.setItem('my_todo_trash', JSON.stringify(todoTrash));
                sortTodos();
                renderTodos();
                console.error('删除待办失败:', error);
            }
        }

        async function restoreTodo(id) {
            const idx = todoTrash.findIndex(x => x.id === id);
            if (idx === -1) return;
            const t = todoTrash[idx];
            // 乐观：先从回收站移除
            todoTrash.splice(idx, 1);
            localStorage.setItem('my_todo_trash', JSON.stringify(todoTrash));
            renderTodos();
            try {
                const { data, error } = await supabaseClient.from('todos')
                    .insert([{ text: t.text, is_completed: t.is_completed, order_index: todos.length }])
                    .select();
                if (!error && data && data[0]) {
                    todos.push(data[0]);
                    sortTodos();
                } else {
                    // 回滚回收站
                    todoTrash.splice(idx, 0, t);
                    localStorage.setItem('my_todo_trash', JSON.stringify(todoTrash));
                    renderTodos();
                    console.error('还原待办失败:', error);
                }
            } catch (err) {
                todoTrash.splice(idx, 0, t);
                localStorage.setItem('my_todo_trash', JSON.stringify(todoTrash));
                renderTodos();
                console.error('还原待办异常:', err);
            }
        }

        function burnTodo(id) {
            todoTrash = todoTrash.filter(t => t.id !== id);
            localStorage.setItem('my_todo_trash', JSON.stringify(todoTrash));
            renderTodos();
        }

        // ── 灵感 CRUD ──
        async function addIdea() {
            const inp = document.getElementById('idea-input');
            const text = inp.value.trim();
            if (!text) return;
            inp.value = '';
            inp.style.height = '46px'; // 重置高度
            try {
                const { data, error } = await supabaseClient.from('ideas')
                    .insert([{ text }])
                    .select();
                if (!error && data && data[0]) {
                    ideas.unshift(data[0]);
                    renderIdeas();
                } else if (error) {
                    inp.value = text;
                    console.error('添加灵感失败:', error);
                }
            } catch (err) {
                inp.value = text;
                console.error('添加灵感异常:', err);
            }
        }

        async function trashIdea(id) {
            const idx = ideas.findIndex(x => x.id === id);
            if (idx === -1) return;
            const t = ideas[idx];
            ideaTrash.push({ id: t.id, text: t.text, time: formatTime(t.created_at) });
            localStorage.setItem('my_idea_trash', JSON.stringify(ideaTrash));
            ideas.splice(idx, 1);
            renderIdeas();
            const { error } = await supabaseClient.from('ideas').delete().eq('id', id);
            if (error) {
                ideas.splice(idx, 0, t);
                ideaTrash.pop();
                localStorage.setItem('my_idea_trash', JSON.stringify(ideaTrash));
                renderIdeas();
                console.error('删除灵感失败:', error);
            }
        }

        async function restoreIdea(id) {
            const idx = ideaTrash.findIndex(x => x.id === id);
            if (idx === -1) return;
            const t = ideaTrash[idx];
            ideaTrash.splice(idx, 1);
            localStorage.setItem('my_idea_trash', JSON.stringify(ideaTrash));
            renderIdeas();
            try {
                const { data, error } = await supabaseClient.from('ideas').insert([{ text: t.text }]).select();
                if (!error && data && data[0]) {
                    ideas.unshift(data[0]);
                } else {
                    ideaTrash.splice(idx, 0, t);
                    localStorage.setItem('my_idea_trash', JSON.stringify(ideaTrash));
                    renderIdeas();
                    console.error('还原灵感失败:', error);
                }
            } catch (err) {
                ideaTrash.splice(idx, 0, t);
                localStorage.setItem('my_idea_trash', JSON.stringify(ideaTrash));
                renderIdeas();
                console.error('还原灵感异常:', err);
            }
        }

        function burnIdea(id) {
            ideaTrash = ideaTrash.filter(x => x.id !== id);
            localStorage.setItem('my_idea_trash', JSON.stringify(ideaTrash));
            renderIdeas();
        }

        // ===================== 拖拽（更新本地状态 + 后台同步）=====================
        function setupDragAndDrop() {
            const listEl = document.getElementById('todo-list');
            listEl.addEventListener('dragstart', (e) => {
                const c = e.target.closest('.todo-item');
                if (!c || isTodoTrashView || isEditingMode) { e.preventDefault(); return; }
                draggedTodoId = parseInt(c.dataset.id);
                setTimeout(() => { c.style.display = 'none'; c.parentNode.insertBefore(dragPlaceholder, c); }, 0);
            });
            listEl.addEventListener('dragover', (e) => {
                e.preventDefault();
                const t = e.target.closest('.todo-item');
                if (t && t.dataset.id != draggedTodoId && !isTodoTrashView) {
                    const r = t.getBoundingClientRect();
                    if (e.clientY < r.top + r.height / 2) t.parentNode.insertBefore(dragPlaceholder, t);
                    else t.parentNode.insertBefore(dragPlaceholder, t.nextSibling);
                }
            });
            listEl.addEventListener('drop', (e) => {
                e.preventDefault();
                if (isTodoTrashView || !draggedTodoId) return;
                const el = document.querySelector(`[data-id="${draggedTodoId}"]`);
                if (el && dragPlaceholder.parentNode) dragPlaceholder.parentNode.insertBefore(el, dragPlaceholder);
            });
            listEl.addEventListener('dragend', async () => {
                if (dragPlaceholder.parentNode) dragPlaceholder.parentNode.removeChild(dragPlaceholder);
                const el = document.querySelector(`[data-id="${draggedTodoId}"]`);
                if (el) el.style.display = '';

                // 从 DOM 读取新顺序，更新本地数据
                const domItems = document.querySelectorAll('#todo-list .todo-item');
                const changedUpdates = [];
                domItems.forEach((item, i) => {
                    const id = parseInt(item.dataset.id);
                    const todo = todos.find(t => t.id === id);
                    if (todo && (todo.order_index ?? 0) !== i) {
                        todo.order_index = i;
                        changedUpdates.push({ id, order_index: i });
                    }
                });
                sortTodos();
                renderTodos();

                // 后台同步仅更新变化的项
                if (changedUpdates.length) {
                    await Promise.allSettled(
                        changedUpdates.map(u => supabaseClient.from('todos').update({ order_index: u.order_index }).eq('id', u.id))
                    );
                }
                draggedTodoId = null;
            });
        }

        // ===================== 就地编辑（更新本地状态，不再全量重载）=====================
        function startEditTodo(id, span) {
            if (isTodoTrashView) return;
            isEditingMode = true;
            const c = span.closest('.todo-item');
            if (c) c.setAttribute('draggable', 'false');
            const cur = span.innerText;
            const inp = document.createElement('input');
            inp.type = 'text'; inp.className = 'inline-edit-input'; inp.value = cur;
            span.replaceWith(inp); inp.focus(); inp.select();
            const done = async () => {
                if (!isEditingMode) return;
                const v = inp.value.trim();
                if (v && v !== cur) {
                    const todo = todos.find(t => t.id === id);
                    if (todo) todo.text = v;
                    supabaseClient.from('todos').update({ text: v }).eq('id', id);
                }
                isEditingMode = false;
                renderTodos();
            };
            inp.addEventListener('blur', done);
            inp.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') done();
                if (e.key === 'Escape') { isEditingMode = false; renderTodos(); }
            });
        }

        function startEditIdea(id, div) {
            if (isIdeaTrashView) return;
            isEditingMode = true;
            const cur = div.innerText;
            const ta = document.createElement('textarea');
            ta.className = 'inline-edit-textarea'; ta.value = cur;
            div.replaceWith(ta); ta.focus();
            const done = async () => {
                if (!isEditingMode) return;
                const v = ta.value.trim();
                if (v && v !== cur) {
                    const idea = ideas.find(x => x.id === id);
                    if (idea) idea.text = v;
                    supabaseClient.from('ideas').update({ text: v }).eq('id', id);
                }
                isEditingMode = false;
                renderIdeas();
            };
            ta.addEventListener('blur', done);
            ta.addEventListener('keydown', (e) => {
                if ((e.ctrlKey||e.metaKey)&&e.key==='Enter') done();
                if (e.key==='Escape') { isEditingMode = false; renderIdeas(); }
            });
        }

        // ===================== UI 工具 =====================
        function toggleDropdown(e) { e.stopPropagation(); document.getElementById('theme-dropdown').classList.toggle('active'); }
        function initTheme(n) { document.documentElement.setAttribute('data-theme', n); document.getElementById('dropdown-title').innerText = themeNamesMap[n]||'简约浅灰'; updateDropdownHighlight(n); }

        // 主题切换（无遮罩）
        function selectTheme(n, t) {
            document.getElementById('theme-dropdown').classList.remove('active');
            document.documentElement.setAttribute('data-theme', n);
            document.getElementById('dropdown-title').innerText = t;
            localStorage.setItem('my_theme', n);
            updateDropdownHighlight(n);
        }

        function updateDropdownHighlight(n) { document.querySelectorAll('.dropdown-item').forEach(i => { i.classList.toggle('selected', i.getAttribute('data-value')===n); }); }
        function formatTime(ts) { if (!ts) return '未知'; const d = new Date(ts); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }
        function triggerViewTransition(id, fn) { const c = document.getElementById(id); c.classList.add('view-changing'); setTimeout(() => { fn(); c.classList.remove('view-changing'); }, 200); }

        // ===================== 渲染 =====================
        function renderTodos() {
            const list = document.getElementById('todo-list'); list.innerHTML = '';
            if (isTodoTrashView) {
                if (!todoTrash.length) { list.innerHTML = '<div class="empty-tip"><span class="empty-icon">🗑️</span>回收站空空如也</div>'; return; }
                todoTrash.forEach(item => {
                    const el = document.createElement('div'); el.className = 'item-card';
                    el.innerHTML = `<div class="todo-info-wrapper"><span style="color:var(--text-muted);font-size:0.92rem;">${escapeHtml(item.text)}</span><span class="timestamp">创建于 ${item.time||'未知'}</span></div><div><button class="action-text-btn restore-btn" onclick="restoreTodo(${item.id})">还原</button><button class="action-text-btn" onclick="burnTodo(${item.id})">粉碎</button></div>`;
                    list.appendChild(el);
                });
            } else {
                if (!todos.length) { list.innerHTML = '<div class="empty-tip"><span class="empty-icon">📋</span>今天还没有安排任务</div>'; return; }
                todos.forEach((todo, i) => {
                    const el = document.createElement('div');
                    el.className = `item-card todo-item ${todo.is_completed?'completed':''}`;
                    el.setAttribute('draggable','true'); el.dataset.id = todo.id;
                    el.innerHTML = `<div class="todo-content"><input type="checkbox" ${todo.is_completed?'checked':''} onclick="toggleTodo(${todo.id},${todo.is_completed})"><div class="todo-info-wrapper"><div class="todo-text-container"><span class="todo-seq">${i+1}</span><span class="todo-text" ondblclick="startEditTodo(${todo.id},this)">${escapeHtml(todo.text)}</span></div><span class="timestamp">创建于 ${formatTime(todo.created_at)}</span></div></div><button class="action-text-btn" onclick="trashTodo(${todo.id})" style="position:relative;z-index:2;">删除</button>`;
                    list.appendChild(el);
                });
            }
        }

        function toggleTodoTrash() {
            isTodoTrashView = !isTodoTrashView;
            document.getElementById('todo-input-zone').style.display = isTodoTrashView ? 'none' : 'flex';
            document.getElementById('todo-panel-title').innerText = isTodoTrashView ? '待办 · 回收站' : '每日待办';
            document.getElementById('todo-trash-toggle').innerText = isTodoTrashView ? '返回列表' : '回收站';
            triggerViewTransition('todo-list', renderTodos);
        }

        function renderIdeas() {
            const list = document.getElementById('idea-list'); list.innerHTML = '';
            if (isIdeaTrashView) {
                if (!ideaTrash.length) { list.innerHTML = '<div class="empty-tip"><span class="empty-icon">🗑️</span>回收站空空如也</div>'; return; }
                ideaTrash.forEach(item => {
                    const el = document.createElement('div'); el.className = 'idea-card'; el.style.opacity = '0.6';
                    el.innerHTML = `<div class="idea-header"><span class="timestamp">创建于 ${item.time||'未知'}</span><div><button class="action-text-btn restore-btn" onclick="restoreIdea(${item.id})">还原</button><button class="action-text-btn" onclick="burnIdea(${item.id})">粉碎</button></div></div><div class="idea-text">${escapeHtml(item.text)}</div>`;
                    list.appendChild(el);
                });
            } else {
                if (!ideas.length) { list.innerHTML = '<div class="empty-tip"><span class="empty-icon">💡</span>捕捉一瞬间的火花</div>'; return; }
                ideas.forEach(idea => {
                    const el = document.createElement('div'); el.className = 'idea-card';
                    el.innerHTML = `<div class="idea-header"><span class="timestamp">记录于 ${formatTime(idea.created_at)}</span><button class="action-text-btn" onclick="trashIdea(${idea.id})">删除</button></div><div class="idea-text" ondblclick="startEditIdea(${idea.id},this)">${escapeHtml(idea.text)}</div>`;
                    list.appendChild(el);
                });
            }
        }

        function toggleIdeaTrash() {
            isIdeaTrashView = !isIdeaTrashView;
            document.getElementById('idea-input-zone').style.display = isIdeaTrashView ? 'none' : 'flex';
            document.getElementById('idea-panel-title').innerText = isIdeaTrashView ? '灵感 · 回收站' : '灵感闪现';
            document.getElementById('idea-trash-toggle').innerText = isIdeaTrashView ? '返回列表' : '回收站';
            triggerViewTransition('idea-list', renderIdeas);
        }

        function escapeHtml(t) { const m = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}; return t.replace(/[&<>"']/g, c => m[c]); }
    </script>
</body>
